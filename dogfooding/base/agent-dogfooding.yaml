# Copyright Contributors to the KubeOpenCode project
# Unified agent configuration - capabilities defined by .claude/skills/ in the repo.
# Adding a new capability = adding a SKILL.md file via PR.
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: dogfooding
spec:
  agentImage: quay.io/kubeopencode/kubeopencode-agent-opencode:latest
  executorImage: quay.io/kubeopencode/kubeopencode-agent-devbox:latest
  workspaceDir: /workspace
  serviceAccountName: kubeopencode-agent
  # Handles parallel tasks (GitHub event + scheduled + Slack)
  maxConcurrentTasks: 3
  # Rate limiting: max 200 tasks per 24 hours
  quota:
    maxTaskStarts: 200
    windowSeconds: 86400
  # OpenCode configuration using Google Gemini 3.1 Pro
  config: |
    {
      "$schema": "https://opencode.ai/config.json",
      "model": "opencode/gemini-3.1-pro",
      "small_model": "opencode/gemini-3-flash",
      "share": "disabled",
      "autoupdate": false,
      "agent": {
        "general": {
          "model": "opencode/gemini-3-flash-preview"
        }
      }
    }
  contexts:
    # Dogfooding repo at workspace root - AGENTS.md and .opencode/skills/ auto-discovered
    - name: dogfooding
      description: "Dogfooding repo with skills and agent instructions"
      type: Git
      git:
        repository: https://github.com/kubeopencode/dogfooding.git
        ref: main
      mountPath: .
    # KubeOpenCode source code repository
    - name: kubeopencode
      description: "KubeOpenCode source code repository"
      type: Git
      git:
        repository: https://github.com/kubeopencode/kubeopencode.git
        ref: main
      mountPath: kubeopencode
  credentials:
    # Mount entire secret - all keys become env vars automatically
    - name: git
      secretRef:
        name: git-settings
    - name: opencode
      secretRef:
        name: opencode-credentials
    # GitHub App credentials (write access)
    - name: github-app
      secretRef:
        name: github-dev-credentials
    # Slack Bot Token
    - name: slack
      secretRef:
        name: slack-creds
        key: bot-token
      env: SLACK_BOT_TOKEN
