# CronTask that identifies and implements one small safe refactoring.
# Detailed procedure: workflows/periodic-tiny-refactor.md (updated via git commit)
apiVersion: kubeopencode.io/v1alpha1
kind: CronTask
metadata:
  name: tiny-refactor
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: scheduled
    app.kubernetes.io/part-of: kubeopencode-agent
spec:
  # Every 3 days at 8:00 AM UTC
  schedule: "0 8 */3 * *"
  concurrencyPolicy: Forbid
  maxRetainedTasks: 5
  taskTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: kubeopencode
        app.kubernetes.io/component: refactor
        app.kubernetes.io/part-of: kubeopencode-agent
        kubeopencode.io/scheduled: "true"
    spec:
      agentRef:
        name: kubeopencode-agent
      description: |
        Follow the workflow defined in `workflows/periodic-tiny-refactor.md`.
