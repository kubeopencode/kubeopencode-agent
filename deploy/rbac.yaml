# RBAC resources for kubeopencode-agent namespace
#
# All resources (Agent, CronJobs, Slack gateway) run in the same namespace,
# so we use namespace-scoped Roles instead of ClusterRoles.

# --- Agent ServiceAccount ---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeopencode-agent
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeopencode-agent
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: agent
rules:
  # Allow agent to read and update Task resources (e.g., add annotations)
  - apiGroups: ["kubeopencode.io"]
    resources: ["tasks"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Allow agent to update Task status
  - apiGroups: ["kubeopencode.io"]
    resources: ["tasks/status"]
    verbs: ["get", "patch", "update"]
  # Allow agent to read Agent and AgentTemplate configuration (e.g., for self-discovery)
  - apiGroups: ["kubeopencode.io"]
    resources: ["agents", "agenttemplates"]
    verbs: ["get", "list", "watch"]
  # Allow agent to read KubeOpenCodeConfig (system configuration)
  - apiGroups: ["kubeopencode.io"]
    resources: ["kubeopencodeconfigs"]
    verbs: ["get", "list", "watch"]
  # Allow agent to read TaskTemplate resources
  - apiGroups: ["kubeopencode.io"]
    resources: ["tasktemplates"]
    verbs: ["get", "list", "watch"]
  # Allow agent to read Pods and Pod logs (for analyzing previous task results)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Allow agent to read ConfigMaps (for context resolution)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeopencode-agent
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeopencode-agent
subjects:
  - kind: ServiceAccount
    name: kubeopencode-agent

# --- Task Creator Role (used by Slack gateway) ---
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeopencode-task-creator
  labels:
    app.kubernetes.io/name: kubeopencode
rules:
  - apiGroups: ["kubeopencode.io"]
    resources: ["tasks"]
    verbs: ["create", "get", "list", "watch"]

# --- Slack Gateway ServiceAccount ---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: slack-socket-mode-gateway
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: slack

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: slack-socket-mode-gateway
  labels:
    app.kubernetes.io/name: kubeopencode
    app.kubernetes.io/component: slack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeopencode-task-creator
subjects:
  - kind: ServiceAccount
    name: slack-socket-mode-gateway
